name: Build CaptureSposed

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a Release on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest

    # Exposed at job level so the "Sign release APK" step's `if:` can detect them.
    env:
      KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-36" \
                     "build-tools;36.0.0"

      - name: Gradle setup + caching
        uses: gradle/actions/setup-gradle@v4

      - name: Normalise gradlew (strip CRLF) and make executable
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      # --- Debug build: auto-signed with the debug keystore, installable as-is ---
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CaptureSposed-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # --- Release build (minified). Unsigned unless signing secrets are provided ---
      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Sign release APK
        id: sign
        if: ${{ env.KEYSTORE_B64 != '' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          BUILD_TOOLS=$(ls -d "$ANDROID_SDK_ROOT"/build-tools/36.0.0)
          UNSIGNED=$(ls app/build/outputs/apk/release/*-unsigned.apk | head -n1)
          SIGNED="app/build/outputs/apk/release/CaptureSposed-release-signed.apk"
          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED" "$SIGNED"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$RUNNER_TEMP/keystore.jks" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            "$SIGNED"
          echo "signed_apk=$SIGNED" >> "$GITHUB_OUTPUT"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: CaptureSposed-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # --- On a version tag (vX.Y.Z), publish a GitHub Release with the APKs ---
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
